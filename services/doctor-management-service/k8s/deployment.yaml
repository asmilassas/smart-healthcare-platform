apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-management-service
  namespace: healthcare
  labels:
    app: doctor-management-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doctor-management-service
  template:
    metadata:
      labels:
        app: doctor-management-service
    spec:
      containers:
        - name: doctor-management-service
          image: smart-healthcare/doctor-management-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: doctor-service-config
                  key: PORT
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: doctor-service-config
                  key: AUTH_SERVICE_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: doctor-service-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: doctor-service-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-management-service
  namespace: healthcare
spec:
  selector:
    app: doctor-management-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
  type: ClusterIP
---
# Dedicated MongoDB instance for doctor-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-doctor
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-doctor
  template:
    metadata:
      labels:
        app: mongo-doctor
    spec:
      containers:
        - name: mongo-doctor
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-doctor-storage
              mountPath: /data/db
      volumes:
        - name: mongo-doctor-storage
          persistentVolumeClaim:
            claimName: mongo-doctor-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-doctor
  namespace: healthcare
spec:
  selector:
    app: mongo-doctor
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-doctor-pvc
  namespace: healthcare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
