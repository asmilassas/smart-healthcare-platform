apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare
  labels:
    app: appointment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: smart-healthcare/appointment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: PORT
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: DOCTOR_SERVICE_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthcare
spec:
  selector:
    app: appointment-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
  type: ClusterIP
---
# Dedicated MongoDB instance for appointment-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-appointment
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-appointment
  template:
    metadata:
      labels:
        app: mongo-appointment
    spec:
      containers:
        - name: mongo-appointment
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-appointment-storage
              mountPath: /data/db
      volumes:
        - name: mongo-appointment-storage
          persistentVolumeClaim:
            claimName: mongo-appointment-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-appointment
  namespace: healthcare
spec:
  selector:
    app: mongo-appointment
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-appointment-pvc
  namespace: healthcare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi